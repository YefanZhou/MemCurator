dataset:
  data_path: '/home/siruo_google_com/.cache/alfworld/json_2.1.1/train'
  eval_id_data_path: '/home/siruo_google_com/.cache/alfworld/json_2.1.1/valid_seen'
  eval_ood_data_path: '/home/siruo_google_com/.cache/alfworld/json_2.1.1/valid_unseen'
  num_train_games: -1
  num_eval_games: -1

logic:
  domain: '/home/siruo_google_com/.cache/alfworld/logic/alfred.pddl'
  grammar: '/home/siruo_google_com/.cache/alfworld/logic/alfred.twl2'

env:
  type: 'AlfredTWEnv'
  domain_randomization: False
  task_types: [1, 2, 3, 4, 5, 6]
  expert_timeout_steps: 150
  expert_type: "handcoded"
  goal_desc_human_anns_prob: 0.0

  hybrid:
    start_eps: 100000
    thor_prob: 0.5
    eval_mode: "tw"

  thor:
    screen_width: 300
    screen_height: 300
    smooth_nav: False
    save_frames_to_disk: False
    save_frames_path: './videos/'

controller:
  type: 'oracle'
  debug: False
  load_receps: True

mask_rcnn:
  pretrained_model_path: '$ALFWORLD_DATA/detectors/mrcnn.pth'

dagger:
  action_space: "admissible"
  max_target_length: 20
  beam_width: 10
  generate_top_k: 5
  unstick_by_beam_search: False

  training:
    max_nb_steps_per_episode: 50

  fraction_assist:
    fraction_assist_anneal_episodes: 50000
    fraction_assist_anneal_from: 1.0
    fraction_assist_anneal_to: 0.01

  fraction_random:
    fraction_random_anneal_episodes: 0
    fraction_random_anneal_from: 0.0
    fraction_random_anneal_to: 0.0

  replay:
    replay_memory_capacity: 500000
    update_per_k_game_steps: 5
    replay_batch_size: 64
    replay_sample_history_length: 4
    replay_sample_update_from: 2

general:
  random_seed: 42
  use_cuda: False
  visdom: False
  task: 'alfred'
  training_method: 'dagger'
  save_path: './training/'
  observation_pool_capacity: 3
  hide_init_receptacles: False
